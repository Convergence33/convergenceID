<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorateur d'Histoire Locale</title>
  <script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script> <!-- Pour le scan de QR codes -->
  <style>
    /* Tes styles CSS ici */
    #galerie { display: flex; flex-wrap: wrap; gap: 15px; }
    .fiche { width: 120px; border: 1px solid #ccc; padding: 10px; text-align: center; }
    #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
  </style>
</head>
<body>
  <h1>Explorateur d'Histoire Locale</h1>
  <div id="filtres">
    <select id="filtre-commune">
      <option value="">Toutes les communes</option>
    </select>
    <button onclick="demarrerScan()">Scanner un QR code</button>
  </div>
  <div id="galerie"></div>
  <div id="modal">
    <div id="modal-content"></div>
  </div>
  <video id="video" autoplay playsinline style="display: none;"></video>

  <script src="script.js"></script> <!-- Chargement du script -->
</body>
</html>
