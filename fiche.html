<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiche</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button onclick="history.back()">⬅ Retour</button>

  <div id="fiche-detail"></div>

  <script>
    const fiches = [
      { id: "fiche1", titre: "L'ortie", image: "images/carte1.webp", texte: "Description de la carte 1" },
      { id: "fiche2", titre: "Carte 2", image: "images/carte2.webp", texte: "Description de la carte 2" },
      { id: "fiche3", titre: "Carte 3", image: "images/carte3.webp", texte: "Description de la carte 3" }
    ];

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const fiche = fiches.find(f => f.id === id);

    if (fiche) {
      document.getElementById("fiche-detail").innerHTML = `
        <h2>${fiche.titre}</h2>
        <img src="${fiche.image}" class="detail-img">
        <p>${fiche.texte}</p>

        <iframe src="fiches/${fiche.id}.pdf" class="pdf-viewer"></iframe>

        <a href="fiches/${fiche.id}.pdf" download>
          <button>⬇️ Télécharger la fiche</button>
        </a>
      `;
    }
  </script>

</body>
</html>
